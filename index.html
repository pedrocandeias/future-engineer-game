<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Missão: Estudante Universitário do Futuro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="game" width="960" height="540" aria-label="Jogo Missão Estudante Universitário do Futuro"></canvas>
      <div class="controls">
        <span>Setas / A D: mover</span>
        <span>Espaço / W / Seta para cima: saltar</span>
        <span>Seta para baixo / S: agachar</span>
        <span>Enter: avançar, iniciar ou reiniciar</span>
      </div>
      <div class="touch-controls" aria-label="Controlos de toque">
        <div class="touch-group">
          <button class="touch-button touch-button--move" type="button" data-action="left" aria-label="Mover para a esquerda">◀</button>
          <button class="touch-button touch-button--move" type="button" data-action="right" aria-label="Mover para a direita">▶</button>
        </div>
        <div class="touch-group touch-group--actions">
          <button class="touch-button" type="button" data-action="jump" aria-label="Saltar">Saltar</button>
          <button class="touch-button" type="button" data-action="crouch" aria-label="Agachar">Agachar</button>
          <button class="touch-button touch-button--start" type="button" data-action="start" aria-label="Iniciar ou reiniciar">Começar</button>
        </div>
      </div>
    </main>
    <script src="game.js?v=0.7.0"></script>
  </body>
</html>
